<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="color-scheme" content="light" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew Barzik</title>
  <meta name="description" content="An overview of my experience, work, and thinking." />
  <link rel="icon" type="image/jpeg" href="assets/salzburg_philosophy.jpg" />
  <style>* { cursor: none !important; }</style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary': '#5f5e60',
            'surface': '#f9f9fb',
            'surface-container-low': '#f2f4f6',
            'surface-container-lowest': '#ffffff',
            'surface-container-high': '#e4e9ee',
            'surface-container-highest': '#dde3e9',
            'surface-container': '#ebeef2',
            'surface-dim': '#d3dbe2',
            'on-surface': '#2d3338',
            'on-surface-variant': '#596065',
            'on-background': '#2d3338',
            'background': '#f9f9fb',
            'outline-variant': '#acb3b8',
            'outline': '#757c81',
            'primary-dim': '#535254',
            'inverse-surface': '#0c0e10',
            'error': '#9f403d',
          },
          borderRadius: {
            'DEFAULT': '0.25rem',
            'lg': '0.5rem',
            'xl': '0.75rem',
            'full': '9999px',
          },
        }
      }
    }
  </script>
  <style>
    :root { color-scheme: light; }
    * { font-family: 'Inter', sans-serif; }
    body { -webkit-font-smoothing: antialiased; overflow: hidden; }
    .crt-text {
      display: inline-block;
      background: repeating-linear-gradient(
        180deg,
        #050508 0px,
        #1a1a26 1px,
        #6a6a7a 2.5px,
        #1a1a26 4px,
        #050508 5px
      );
      background-size: 100% 5px;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: crt-roll 1.5s linear infinite, crt-flicker 6s step-end infinite;
    }
    @keyframes crt-roll {
      from { background-position: 0 0; }
      to   { background-position: 0 5px; }
    }
    @keyframes crt-flicker {
      0%, 87%, 100% { filter: brightness(1); }
      89%           { filter: brightness(0.78); }
      91%           { filter: brightness(1.12); }
      93%           { filter: brightness(0.84); }
      95%           { filter: brightness(1.06); }
      97%           { filter: brightness(1); }
    }
    .btn-corner { opacity: 0; }
    #access-btn:hover .btn-corner {
      animation: corner-lock 0.3s steps(1, end) forwards;
    }
    @keyframes corner-lock {
      0%   { opacity: 1;   border-color: #9ca3af; }
      20%  { opacity: 0.3; border-color: #9ca3af; }
      25%  { opacity: 1;   border-color: #9ca3af; }
      55%  { opacity: 1;   border-color: #9ca3af; }
      60%  { opacity: 0.2; border-color: #6b7280; }
      65%  { opacity: 1;   border-color: #9ca3af; }
      80%  { opacity: 1;   border-color: #9ca3af; }
      85%  { opacity: 0.4; border-color: #4b5563; }
      90%  { opacity: 1;   border-color: #18181b; }
      100% { opacity: 1;   border-color: #18181b; }
    }
    @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-slow { animation: rotate-slow 120s linear infinite; }
    .animate-slow-reverse { animation: rotate-slow 180s linear infinite reverse; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .blink { animation: blink 1s step-end infinite; }
    #mobile-layout {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      justify-content: center;
      padding: 2.5rem 1.5rem 2rem;
      gap: 2rem;
      z-index: 10;
    }
    #mobile-nav { display: flex; flex-direction: column; gap: 0.75rem; }
    #mobile-nav button { display: block; text-align: left; background: none; border: none; padding: 0; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
    @media (max-width: 767px) {
      #sidebar { display: none !important; }
      #main-area { display: none !important; }
      #keys-hint { display: none !important; }
      #mobile-layout { display: flex !important; }
    }
  </style>
</head>
<body class="h-screen w-screen bg-[#f9f9fb] overflow-hidden">

  <!-- Hero mesh background -->
  <canvas id="hero-bg" style="position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; touch-action:none;"></canvas>

  <!-- Section overlay — loaded via fetch so cursor never navigates away -->
  <div id="section-overlay" style="display:none; position:fixed; inset:0; background:#f9f9fb; z-index:200; overflow-y:auto;">
    <div id="section-content"></div>
  </div>

  <!-- Fixed sidebar left -->
  <div id="sidebar" class="fixed left-12 top-1/2 -translate-y-1/2 z-50">
    <div class="w-[260px] bg-white py-10 px-6" style="clip-path:polygon(14px 0%,calc(100% - 14px) 0%,100% 14px,100% calc(100% - 14px),calc(100% - 14px) 100%,14px 100%,0% calc(100% - 14px),0% 14px); filter:drop-shadow(0 30px 60px rgba(0,0,0,0.05));">
      <div class="mb-6 text-center">
        <span class="text-[13px] uppercase tracking-[0.15em] text-[#7c7e84] font-semibold">[ INDEX ]</span>
      </div>
      <nav id="sidebar-nav" class="flex flex-col gap-1">
        <!-- Built by JS -->
      </nav>
      <p id="keys-hint" class="text-center text-[9px] font-medium tracking-[0.15em] uppercase text-zinc-400 mt-6">Use keys to navigate</p>
    </div>
  </div>

  <!-- Mobile layout (hidden on desktop) -->
  <div id="mobile-layout">
    <div id="mobile-nav"></div>
    <div id="mobile-card" style="background:white; overflow:hidden; transition:opacity 0.2s ease; clip-path:polygon(14px 0%,calc(100% - 14px) 0%,100% 14px,100% calc(100% - 14px),calc(100% - 14px) 100%,14px 100%,0% calc(100% - 14px),0% 14px); filter:drop-shadow(0 10px 30px rgba(0,0,0,0.07));">
      <div id="mobile-card-image-wrap" style="width:100%; height:180px; overflow:hidden; display:none;">
        <img id="mobile-card-image" src="" alt="" style="width:100%; height:100%; object-fit:cover;" />
      </div>
      <div style="padding:2rem; display:flex; flex-direction:column; gap:1.25rem;">
        <h2 id="mobile-card-title" class="crt-text" style="font-size:14px; text-transform:uppercase; letter-spacing:0.05em; font-weight:600; color:#18181b;"></h2>
        <p id="mobile-card-desc" style="font-size:13px; line-height:1.6; color:#71717a; font-weight:500;"></p>
        <div style="display:flex; justify-content:center;">
          <button id="mobile-access-btn" style="padding:0.75rem 2.5rem; background:transparent; color:#18181b; font-size:11px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; font-family:'Inter',sans-serif; border:none;">[ ACCESS ]</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main content area -->
  <div id="main-area" class="pl-[280px] h-screen flex items-center justify-center" style="position:relative; z-index:10; margin-left:-280px;">
    <!-- Card -->
    <div class="pointer-events-auto">
        <div id="card-inner" class="w-[320px] bg-white flex flex-col overflow-hidden" style="transition:opacity 0.2s ease; clip-path:polygon(14px 0%,calc(100% - 14px) 0%,100% 14px,100% calc(100% - 14px),calc(100% - 14px) 100%,14px 100%,0% calc(100% - 14px),0% 14px); filter:drop-shadow(0 10px 30px rgba(0,0,0,0.07));">

          <!-- Section image (hidden when no image) -->
          <div id="card-image-wrap" class="w-full h-[140px] overflow-hidden hidden">
            <img id="card-image" src="" alt="" class="w-full h-full object-cover" />
          </div>

          <!-- Text content -->
          <div class="p-8 flex flex-col items-start text-left space-y-6">
            <h2 id="card-title" class="crt-text text-[14px] uppercase tracking-wider font-semibold text-zinc-900"></h2>
            <p id="card-desc" class="text-[13px] leading-relaxed text-zinc-500 font-medium"></p>

            <!-- ACCESS button -->
            <div class="w-full flex justify-center">
              <button id="access-btn" class="relative px-10 py-3 bg-transparent text-zinc-900 text-[11px] font-bold tracking-[0.2em] uppercase">
                <span class="relative z-10">[ ACCESS ]</span>
                <div class="btn-corner absolute top-0 left-0 w-2 h-2 border-t border-l"></div>
                <div class="btn-corner absolute top-0 right-0 w-2 h-2 border-t border-r"></div>
                <div class="btn-corner absolute bottom-0 left-0 w-2 h-2 border-b border-l"></div>
                <div class="btn-corner absolute bottom-0 right-0 w-2 h-2 border-b border-r"></div>
              </button>
            </div>
          </div>

        </div>
    </div>
  </div>

  <!-- Atmospheric gradient -->
  <div class="fixed top-0 right-0 w-1/3 h-full bg-gradient-to-l from-zinc-100/20 to-transparent pointer-events-none -z-10"></div>

  <script>
    const sections = [
      { id: 'introduction', label: 'INTRODUCTION', index: 1, desc: 'A purpose of the website / an overview of the sections.',                              url: 'introduction.html', image: 'assets/hands.jpg',             imagePosition: 'center' },
      { id: 'signalling',   label: 'SIGNALLING',   index: 2, desc: 'An overview of the things that I have done / an informal CV.',             url: 'signalling.html',   image: 'assets/pilot_signalling.jpg',  imagePosition: 'center' },
      { id: 'philosophy',   label: 'PHILOSOPHY',   index: 3, desc: 'A collection of quotes and aphorisms / concepts that influenced me.',            url: 'philosophy.html',   image: 'assets/salzburg_philosophy.jpg', imagePosition: 'center' },
      { id: 'athletics',    label: 'ATHLETICS',    index: 4, desc: 'My obsession and pursuit of athleticism / accomplishments.',                          url: 'athletics.html',    image: 'assets/azariancross.jpg',      imagePosition: 'top' },
      { id: 'reading',      label: 'READING LOG',  index: 5, desc: 'A collection of books that I have read / reread in the last year or so.',                        url: 'reading-log.html',  image: 'assets/bookstore.jpg',         imagePosition: 'center' },
    ];

    const dotPositions = {
      introduction: { x: 300, y: 0   },
      signalling:   { x: 585, y: 207 },
      philosophy:   { x: 530, y: 493 },
      athletics:    { x: 54,  y: 472 },
      reading:      { x: 40,  y: 150 },
    };

    sections.forEach(s => { if (s.image) { const i = new Image(); i.src = s.image; } });

    let activeId = 'introduction';

    function buildNav() {
      const nav = document.getElementById('sidebar-nav');
      nav.innerHTML = '';
      sections.forEach(section => {
        const isActive = section.id === activeId;
        const btn = document.createElement('button');
        btn.className = [
          'w-full flex items-center gap-3 px-4 py-2.5 rounded-2xl transition-all duration-200 text-left',
          isActive ? 'text-[#1d1d1f]' : 'text-[#86868b] hover:text-[#1d1d1f]'
        ].join(' ');
        btn.innerHTML = `
          <span class="text-[11px] w-7 shrink-0 font-medium">[${section.index}]</span>
          <span class="text-[14px] uppercase tracking-wider font-semibold flex-1">${section.label}</span>
          ${isActive ? '<span class="text-[14px] text-[#1d1d1f] ml-auto blink font-semibold">&#8249;</span>' : ''}
        `;
        btn.addEventListener('click', () => setActive(section.id));
        nav.appendChild(btn);
      });

      const mobileNav = document.getElementById('mobile-nav');
      mobileNav.innerHTML = '';
      sections.forEach(section => {
        const isActive = section.id === activeId;
        const btn = document.createElement('button');
        btn.style.color = isActive ? '#1d1d1f' : '#86868b';
        btn.innerHTML = section.label + (isActive ? ' <span class="blink">‹</span>' : '');
        btn.addEventListener('click', () => setActive(section.id));
        mobileNav.appendChild(btn);
      });
    }

    function updateDots(id) { /* handled by canvas */ }

    function setActive(id) {
      window._activeSectionId = id;
      const card = document.getElementById('card-inner');
      const mobileCard = document.getElementById('mobile-card');

      // Fade out cards
      card.style.opacity = '0';
      mobileCard.style.opacity = '0';
      const line = document.getElementById('active-line');
      if (line) line.style.opacity = '0';

      setTimeout(() => {
        activeId = id;
        const section = sections.find(s => s.id === id);

        // Update desktop card
        document.getElementById('card-title').textContent = section.label;
        document.getElementById('card-desc').textContent = section.desc;
        const imageWrap = document.getElementById('card-image-wrap');
        const img = document.getElementById('card-image');
        if (section.image) {
          img.src = section.image;
          img.style.objectPosition = section.imagePosition || 'center';
          imageWrap.classList.remove('hidden');
        } else {
          imageWrap.classList.add('hidden');
          img.src = '';
        }
        const btn = document.getElementById('access-btn');
        btn.style.opacity = '';
        btn.style.pointerEvents = '';
        btn.onclick = () => openSection(section.url);

        // Update mobile card
        document.getElementById('mobile-card-title').textContent = section.label;
        document.getElementById('mobile-card-desc').textContent = section.desc;
        const mobileImageWrap = document.getElementById('mobile-card-image-wrap');
        const mobileImg = document.getElementById('mobile-card-image');
        if (section.image) {
          mobileImg.src = section.image;
          mobileImg.style.objectPosition = section.imagePosition || 'center';
          mobileImageWrap.style.display = '';
        } else {
          mobileImageWrap.style.display = 'none';
          mobileImg.src = '';
        }
        document.getElementById('mobile-access-btn').onclick = () => openSection(section.url);

        updateDots(id);
        buildNav();

        // Fade in cards
        card.style.opacity = '1';
        mobileCard.style.opacity = '1';
        if (line) line.style.opacity = '1';
      }, 200);
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '[ copied ]';
        setTimeout(() => { btn.textContent = '[ copy ]'; }, 1500);
      });
    }

    // SPA section loader — fetches section HTML and injects it so cursor never navigates away
    const overlay = document.getElementById('section-overlay');
    const sectionContent = document.getElementById('section-content');

    function closeSection() {
      overlay.style.display = 'none';
      sectionContent.innerHTML = '';
    }

    async function openSection(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('fetch failed');
        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Collect <style> tags from head
        const headStyles = Array.from(doc.head.querySelectorAll('style'))
          .map(s => s.outerHTML).join('');

        // Prepare body HTML — strip cursor.js script tag
        const body = doc.body;
        body.querySelectorAll('script[src="cursor.js"]').forEach(s => s.remove());

        sectionContent.innerHTML = headStyles + body.innerHTML;

        // Re-execute inline scripts (DOMParser doesn't run them)
        sectionContent.querySelectorAll('script').forEach(old => {
          const s = document.createElement('script');
          s.textContent = old.textContent;
          old.replaceWith(s);
        });

        // Wire [RETURN TO HOME] links to close overlay instead of navigating
        sectionContent.querySelectorAll('a[href="index.html"]').forEach(a => {
          a.href = '#';
          a.addEventListener('click', e => { e.preventDefault(); closeSection(); });
        });

        overlay.style.display = 'block';
      } catch (_) {
        // Fallback for file:// protocol — direct navigation
        window.location.href = url;
      }
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      const current = sections.findIndex(s => s.id === activeId);
      if (e.key === 'ArrowUp') {
        const prev = (current - 1 + sections.length) % sections.length;
        setActive(sections[prev].id);
      } else if (e.key === 'ArrowDown') {
        const next = (current + 1) % sections.length;
        setActive(sections[next].id);
      } else if (e.key >= '1' && e.key <= '5') {
        setActive(sections[parseInt(e.key) - 1].id);
      }
    });

    // Initialize
    buildNav();
    setActive('introduction');
  </script>
  <script>
    (function () {
      const canvas = document.getElementById('hero-bg');
      const ctx    = canvas.getContext('2d');

      const WALL_X = 6.0, WALL_Y = 3.8;
      const ROT_Y  = -1.35, CAM_Z = 8.0;
      const TILT   = 0.18;

      const sinBase = Math.sin(ROT_Y);
      const RZ_NEAR = WALL_X  * sinBase;
      const RZ_FAR  = -WALL_X * sinBase;
      const RZ_SPAN = RZ_FAR - RZ_NEAR;

      // ── Per-section dot highlight system ──────────────────────────────
      const SECTION_KEYS = ['introduction', 'signalling', 'philosophy', 'athletics', 'reading'];

      // Fast deterministic integer hash (Wang hash variant)
      function ihash(n) {
        n = Math.imul((n | 0) ^ ((n >>> 16) | 0), 0x45d9f3b);
        n = Math.imul(n ^ (n >>> 16), 0x45d9f3b);
        return (n ^ (n >>> 16)) >>> 0;
      }

      // Returns true if this (col, row) dot belongs to section sidx's pattern.
      // Each section gets a stable threshold in [0.40, 0.60] so 40–60% are lit.
      function isDotHighlighted(sidx, c, r) {
        const threshold = 0.40 + (ihash(sidx * 7919 + 42) / 0x100000000) * 0.20;
        return (ihash(sidx * 100003 + c * 1009 + r) / 0x100000000) < threshold;
      }

      let _dotId    = null;   // currently displayed section
      let _dotAlpha = 0.0;    // 0 → 1 fade progress
      const DOT_FADE = 0.015; // ~1 s fade at 60 fps — atmospheric
      // ─────────────────────────────────────────────────────────────────

      // Octagon chamfer — straight 45° cuts matching the site's clip-path aesthetic.
      function drawChamferedQuad(c, rf) {
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
          const prev = c[(i + 3) % 4], curr = c[i], next = c[(i + 1) % 4];
          const ax = prev.x - curr.x, ay = prev.y - curr.y;
          const bx = next.x - curr.x, by = next.y - curr.y;
          const la = Math.hypot(ax, ay) || 0.001, lb = Math.hypot(bx, by) || 0.001;
          const r  = Math.min(la, lb) * rf;
          const p1x = curr.x + (ax/la)*r, p1y = curr.y + (ay/la)*r;
          const p2x = curr.x + (bx/lb)*r, p2y = curr.y + (by/lb)*r;
          if (i === 0) ctx.moveTo(p1x, p1y); else ctx.lineTo(p1x, p1y);
          ctx.lineTo(p2x, p2y);
        }
        ctx.closePath();
      }

      function resize() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width  = window.innerWidth  * dpr;
        canvas.height = window.innerHeight * dpr;
      }
      resize();
      window.addEventListener('resize', resize);

      function frame() {
        const dpr = window.devicePixelRatio || 1;
        const W   = window.innerWidth;
        const H   = window.innerHeight;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.scale(dpr, dpr);
        ctx.translate(W * 0.5, H * 0.5);
        ctx.rotate(TILT);
        ctx.translate(-W * 0.5, -H * 0.5);

        const FOC = H;
        const VPX = W * 0.70;
        const VPY = H * 0.50;
        const WS  = 13.0 * (RZ_NEAR + CAM_Z) / FOC;

        const PITCH_PX    = 28;
        const WORLD_PITCH = PITCH_PX * CAM_Z / FOC;
        const COLS = Math.round(WALL_X * 2 / WORLD_PITCH) + 1;
        const ROWS = Math.round(WALL_Y * 2 / WORLD_PITCH) + 1;

        const rotY = ROT_Y;
        const cosY = Math.cos(rotY), sinY = Math.sin(rotY);

        const pts = [];
        for (let c = 0; c < COLS; c++) {
          for (let r = 0; r < ROWS; r++) {
            const u = c / (COLS - 1), v = r / (ROWS - 1);
            const wx = (u - 0.5) * WALL_X * 2, wy = (v - 0.5) * WALL_Y * 2;
            const rx = wx * cosY, rz = wx * sinY;
            const depth = rz + CAM_Z;
            if (depth <= 0.01) continue;
            pts.push({ wx, wy, rz, depth, c, r });
          }
        }
        pts.sort((a, b) => b.rz - a.rz);

        // ── Advance highlight fade ───────────────────────────────────────
        const targetId = window._activeSectionId || 'introduction';
        if (_dotId !== targetId) { _dotId = targetId; _dotAlpha = 0.0; }
        _dotAlpha = Math.min(1.0, _dotAlpha + DOT_FADE);
        const sidx = SECTION_KEYS.indexOf(_dotId);
        // ─────────────────────────────────────────────────────────────────

        for (const p of pts) {
          const t = Math.min(1, Math.max(0, (p.rz - RZ_NEAR) / RZ_SPAN));
          const tileWS = WS;

          const offsets = [[-tileWS,-tileWS],[tileWS,-tileWS],[tileWS,tileWS],[-tileWS,tileWS]];
          const corners = offsets.map(([dw, dh]) => {
            const cwx = p.wx + dw;
            const crx = cwx * cosY, crz = cwx * sinY;
            const cd = crz + CAM_Z;
            if (cd <= 0.01) return null;
            const cs = FOC / cd;
            return { x: VPX + crx * cs, y: VPY + (p.wy + dh) * cs };
          });
          if (corners.some(c => c === null)) continue;

          const vy = p.wy / WALL_Y;
          const vertFade = Math.max(0, 1 - vy * vy);
          const alpha = (0.01 + (1 - t) * 0.09) * vertFade;

          // ── Highlight: green dots, staggered + one-time glitch ───────
          if (sidx >= 0 && _dotAlpha > 0 && isDotHighlighted(sidx, p.c, p.r)) {
            // Per-dot stagger [0, 0.35]: dots trickle in at different times.
            const stagger = (ihash(p.c * 997 + p.r * 31 + sidx * 13 + 7) / 0x100000000) * 0.35;
            const dotProgress = Math.max(0, Math.min(1, (_dotAlpha - stagger) / 0.65));

            // One-time stutter: each dot has a fixed moment in [0.25, 0.70]
            // of its own fade-in where alpha briefly dips. Only active while
            // the dot is mid-transition (dotProgress < 1), never recurs.
            const glitchMoment = 0.25 + (ihash(p.c * 113 + p.r * 71 + sidx * 17) / 0x100000000) * 0.45;
            const nearGlitch   = dotProgress > 0 && dotProgress < 1.0
                               && Math.abs(dotProgress - glitchMoment) < 0.022;
            const glitchMult   = nearGlitch ? 0.80 : 1.0;

            const screenX = VPX + p.wx * cosY * (FOC / p.depth);
            const rightness = Math.max(0, Math.min(1, (screenX - W * 0.28) / (W * 0.42)));
            const bAlpha = 0.14 * (1 - t * 0.35) * vertFade * dotProgress * rightness * glitchMult;
            if (bAlpha > 0.004) {
              ctx.fillStyle = `rgba(0,0,0,${bAlpha.toFixed(3)})`;
              drawChamferedQuad(corners, 0.28);
              ctx.fill();
              continue;
            }
          }
          // ─────────────────────────────────────────────────────────────

          ctx.fillStyle = `rgba(0,0,0,${alpha.toFixed(3)})`;
          drawChamferedQuad(corners, 0.28);
          ctx.fill();
        }

        ctx.restore();
        requestAnimationFrame(frame);
      }
      frame();
    })();
  </script>
  <script>
    (function () {
      const noiseCanvases = [];

      function attachNoise(wrapId) {
        const wrap = document.getElementById(wrapId);
        if (!wrap) return;
        wrap.style.position = 'relative';
        const canvas = document.createElement('canvas');
        canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0.06;';
        wrap.appendChild(canvas);
        noiseCanvases.push(canvas);
      }

      attachNoise('card-image-wrap');
      attachNoise('mobile-card-image-wrap');

      let tick = 0;
      function loop() {
        tick++;
        // Redraw every 3 frames — fast enough to flicker, not overwhelming
        if (tick % 3 === 0) {
          noiseCanvases.forEach(canvas => {
            const w = canvas.parentElement ? canvas.parentElement.offsetWidth  : 0;
            const h = canvas.parentElement ? canvas.parentElement.offsetHeight : 0;
            if (w === 0 || h === 0) return;
            if (canvas.width !== w || canvas.height !== h) {
              canvas.width  = w;
              canvas.height = h;
            }
            const ctx  = canvas.getContext('2d');
            const data = ctx.createImageData(w, h);
            const buf  = data.data;
            for (let i = 0; i < buf.length; i += 4) {
              const v = Math.random() > 0.5 ? 255 : 0;
              buf[i] = buf[i + 1] = buf[i + 2] = v;
              buf[i + 3] = 255;
            }
            ctx.putImageData(data, 0, 0);
          });
        }
        requestAnimationFrame(loop);
      }
      loop();
    })();
  </script>
  <script src="cursor.js"></script>
</body>
