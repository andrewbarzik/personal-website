<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Index</title>
  <style>* { cursor: none !important; }</style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary': '#5f5e60',
            'surface': '#f9f9fb',
            'surface-container-low': '#f2f4f6',
            'surface-container-lowest': '#ffffff',
            'surface-container-high': '#e4e9ee',
            'surface-container-highest': '#dde3e9',
            'surface-container': '#ebeef2',
            'surface-dim': '#d3dbe2',
            'on-surface': '#2d3338',
            'on-surface-variant': '#596065',
            'on-background': '#2d3338',
            'background': '#f9f9fb',
            'outline-variant': '#acb3b8',
            'outline': '#757c81',
            'primary-dim': '#535254',
            'inverse-surface': '#0c0e10',
            'error': '#9f403d',
          },
          borderRadius: {
            'DEFAULT': '0.25rem',
            'lg': '0.5rem',
            'xl': '0.75rem',
            'full': '9999px',
          },
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { -webkit-font-smoothing: antialiased; overflow: hidden; }
    @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-slow { animation: rotate-slow 120s linear infinite; }
    .animate-slow-reverse { animation: rotate-slow 180s linear infinite reverse; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .blink { animation: blink 1s step-end infinite; }
    #mobile-layout {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      justify-content: center;
      padding: 2.5rem 1.5rem 2rem;
      gap: 2rem;
      z-index: 10;
    }
    #mobile-nav { display: flex; flex-direction: column; gap: 0.75rem; }
    #mobile-nav button { display: block; text-align: left; background: none; border: none; padding: 0; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
    @media (max-width: 767px) {
      #sidebar { display: none !important; }
      #main-area { display: none !important; }
      #keys-hint { display: none !important; }
      #mobile-layout { display: flex !important; }
      #clock-widget { display: none !important; }
    }
  </style>
</head>
<body class="h-screen w-screen bg-[#f9f9fb] overflow-hidden">

  <!-- Hero mesh background -->
  <canvas id="hero-bg" style="position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; touch-action:none;"></canvas>

  <!-- Section overlay — loaded via fetch so cursor never navigates away -->
  <div id="section-overlay" style="display:none; position:fixed; inset:0; background:#f9f9fb; z-index:200; overflow-y:auto;">
    <div id="section-content"></div>
  </div>

  <!-- Fixed sidebar left -->
  <div id="sidebar" class="fixed left-12 top-1/2 -translate-y-1/2 z-50">
    <div class="w-[260px] rounded-[2rem] bg-white shadow-[0_30px_60px_rgba(0,0,0,0.05)] py-10 px-6">
      <div class="mb-6 text-center">
        <span class="text-[13px] uppercase tracking-[0.15em] text-[#7c7e84] font-semibold">[ INDEX ]</span>
      </div>
      <nav id="sidebar-nav" class="flex flex-col gap-1">
        <!-- Built by JS -->
      </nav>
      <p id="keys-hint" class="text-center text-[9px] font-medium tracking-[0.15em] uppercase text-zinc-400 mt-6">Use keys to navigate</p>
    </div>
  </div>

  <!-- Mobile layout (hidden on desktop) -->
  <div id="mobile-layout">
    <div id="mobile-nav"></div>
    <div id="mobile-card" style="background:white; border-radius:2rem; box-shadow:0 10px 40px rgba(0,0,0,0.04); overflow:hidden; transition:opacity 0.2s ease;">
      <div id="mobile-card-image-wrap" style="width:100%; height:180px; overflow:hidden; display:none;">
        <img id="mobile-card-image" src="" alt="" style="width:100%; height:100%; object-fit:cover;" />
      </div>
      <div style="padding:2rem; display:flex; flex-direction:column; gap:1.25rem;">
        <h2 id="mobile-card-title" style="font-size:14px; text-transform:uppercase; letter-spacing:0.05em; font-weight:600; color:#18181b;"></h2>
        <p id="mobile-card-desc" style="font-size:13px; line-height:1.6; color:#71717a; font-weight:500;"></p>
        <div style="display:flex; justify-content:center;">
          <button id="mobile-access-btn" style="padding:0.75rem 2.5rem; background:transparent; color:#18181b; font-size:11px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; font-family:'Inter',sans-serif; border:none;">[ ACCESS ]</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main content area -->
  <div id="main-area" class="pl-[280px] h-screen flex items-center justify-center" style="position:relative; z-index:10; margin-left:-280px;">
    <!-- Card -->
    <div class="pointer-events-auto">
        <div id="card-inner" class="w-[320px] bg-white rounded-[2rem] shadow-[0_10px_40px_rgba(0,0,0,0.04)] flex flex-col overflow-hidden" style="transition:opacity 0.2s ease;">

          <!-- Section image (hidden when no image) -->
          <div id="card-image-wrap" class="w-full h-[140px] overflow-hidden hidden">
            <img id="card-image" src="" alt="" class="w-full h-full object-cover" />
          </div>

          <!-- Text content -->
          <div class="p-8 flex flex-col items-start text-left space-y-6">
            <h2 id="card-title" class="text-[14px] uppercase tracking-wider font-semibold text-zinc-900"></h2>
            <p id="card-desc" class="text-[13px] leading-relaxed text-zinc-500 font-medium"></p>

            <!-- ACCESS button -->
            <div class="w-full flex justify-center">
              <button id="access-btn" class="relative px-10 py-3 bg-transparent text-zinc-900 text-[11px] font-bold tracking-[0.2em] uppercase group transition-all duration-300">
                <span class="relative z-10">[ ACCESS ]</span>
                <div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-zinc-900 opacity-0 group-hover:opacity-100 transition-all duration-300"></div>
                <div class="absolute top-0 right-0 w-2 h-2 border-t border-r border-zinc-900 opacity-0 group-hover:opacity-100 transition-all duration-300"></div>
                <div class="absolute bottom-0 left-0 w-2 h-2 border-b border-l border-zinc-900 opacity-0 group-hover:opacity-100 transition-all duration-300"></div>
                <div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-zinc-900 opacity-0 group-hover:opacity-100 transition-all duration-300"></div>
              </button>
            </div>
          </div>

        </div>
    </div>
  </div>

  <!-- Atmospheric gradient -->
  <div class="fixed top-0 right-0 w-1/3 h-full bg-gradient-to-l from-zinc-100/20 to-transparent pointer-events-none -z-10"></div>


  <script>
    const sections = [
      { id: 'introduction', label: 'INTRODUCTION', index: 1, desc: 'A purpose of the website / an overview of the sections.',                              url: 'introduction.html', image: 'assets/hands.jpg',             imagePosition: 'center' },
      { id: 'signalling',   label: 'SIGNALLING',   index: 2, desc: 'An overview of the things that I have done or learned / informal CV.',             url: 'signalling.html',   image: 'assets/pilot_signalling.jpg',  imagePosition: 'center' },
      { id: 'philosophy',   label: 'PHILOSOPHY',   index: 3, desc: 'A collection of quotes / aphorisms that influenced my character.',            url: 'philosophy.html',   image: 'assets/salzburg_philosophy.jpg', imagePosition: 'center' },
      { id: 'athletics',    label: 'ATHLETICS',    index: 4, desc: 'My obsession and pursuit in athletics / accomplishments.',                          url: 'athletics.html',    image: 'assets/azariancross.jpg',      imagePosition: 'top' },
      { id: 'reading',      label: 'READING LOG',  index: 5, desc: 'A collection of books that I have read / reread in the last year or so.',                        url: 'reading-log.html',  image: 'assets/bookstore.jpg',         imagePosition: 'center' },
    ];

    const dotPositions = {
      introduction: { x: 300, y: 0   },
      signalling:   { x: 585, y: 207 },
      philosophy:   { x: 530, y: 493 },
      athletics:    { x: 54,  y: 472 },
      reading:      { x: 40,  y: 150 },
    };

    sections.forEach(s => { if (s.image) { const i = new Image(); i.src = s.image; } });

    let activeId = 'introduction';

    function buildNav() {
      const nav = document.getElementById('sidebar-nav');
      nav.innerHTML = '';
      sections.forEach(section => {
        const isActive = section.id === activeId;
        const btn = document.createElement('button');
        btn.className = [
          'w-full flex items-center gap-3 px-4 py-2.5 rounded-2xl transition-all duration-200 text-left',
          isActive ? 'text-[#1d1d1f]' : 'text-[#86868b] hover:text-[#1d1d1f]'
        ].join(' ');
        btn.innerHTML = `
          <span class="text-[11px] w-7 shrink-0 font-medium">[${section.index}]</span>
          <span class="text-[14px] uppercase tracking-wider font-semibold flex-1">${section.label}</span>
          ${isActive ? '<span class="text-[14px] text-[#1d1d1f] ml-auto blink font-semibold">&#8249;</span>' : ''}
        `;
        btn.addEventListener('click', () => setActive(section.id));
        nav.appendChild(btn);
      });

      const mobileNav = document.getElementById('mobile-nav');
      mobileNav.innerHTML = '';
      sections.forEach(section => {
        const isActive = section.id === activeId;
        const btn = document.createElement('button');
        btn.style.color = isActive ? '#1d1d1f' : '#86868b';
        btn.innerHTML = section.label + (isActive ? ' <span class="blink">‹</span>' : '');
        btn.addEventListener('click', () => setActive(section.id));
        mobileNav.appendChild(btn);
      });
    }

    function updateDots(id) { /* dots removed with orbit */ }

    function setActive(id) {
      const card = document.getElementById('card-inner');
      const mobileCard = document.getElementById('mobile-card');

      // Fade out cards
      card.style.opacity = '0';
      mobileCard.style.opacity = '0';
      if (window.setMeshHighlight) window.setMeshHighlight(false);
      const line = document.getElementById('active-line');
      if (line) line.style.opacity = '0';

      setTimeout(() => {
        activeId = id;
        const section = sections.find(s => s.id === id);

        // Update desktop card
        document.getElementById('card-title').textContent = section.label;
        document.getElementById('card-desc').textContent = section.desc;
        const imageWrap = document.getElementById('card-image-wrap');
        const img = document.getElementById('card-image');
        if (section.image) {
          img.src = section.image;
          img.style.objectPosition = section.imagePosition || 'center';
          imageWrap.classList.remove('hidden');
        } else {
          imageWrap.classList.add('hidden');
          img.src = '';
        }
        const btn = document.getElementById('access-btn');
        btn.style.opacity = '';
        btn.style.pointerEvents = '';
        btn.onclick = () => openSection(section.url);

        // Update mobile card
        document.getElementById('mobile-card-title').textContent = section.label;
        document.getElementById('mobile-card-desc').textContent = section.desc;
        const mobileImageWrap = document.getElementById('mobile-card-image-wrap');
        const mobileImg = document.getElementById('mobile-card-image');
        if (section.image) {
          mobileImg.src = section.image;
          mobileImg.style.objectPosition = section.imagePosition || 'center';
          mobileImageWrap.style.display = '';
        } else {
          mobileImageWrap.style.display = 'none';
          mobileImg.src = '';
        }
        document.getElementById('mobile-access-btn').onclick = () => openSection(section.url);

        updateDots(id);
        buildNav();

        // Fade in cards
        card.style.opacity = '1';
        mobileCard.style.opacity = '1';
        if (window.setMeshActive)      window.setMeshActive(id);
        if (window.setMeshHighlight)   window.setMeshHighlight(true);
        if (window.setMeshPunchReturn) window.setMeshPunchReturn();
        if (line) line.style.opacity = '1';
      }, 200);
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '[ copied ]';
        setTimeout(() => { btn.textContent = '[ copy ]'; }, 1500);
      });
    }

    // SPA section loader — fetches section HTML and injects it so cursor never navigates away
    const overlay = document.getElementById('section-overlay');
    const sectionContent = document.getElementById('section-content');

    function closeSection() {
      overlay.style.display = 'none';
      sectionContent.innerHTML = '';
    }

    async function openSection(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('fetch failed');
        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Collect <style> tags from head
        const headStyles = Array.from(doc.head.querySelectorAll('style'))
          .map(s => s.outerHTML).join('');

        // Prepare body HTML — strip cursor.js script tag
        const body = doc.body;
        body.querySelectorAll('script[src="cursor.js"]').forEach(s => s.remove());

        sectionContent.innerHTML = headStyles + body.innerHTML;

        // Re-execute inline scripts (DOMParser doesn't run them)
        sectionContent.querySelectorAll('script').forEach(old => {
          const s = document.createElement('script');
          s.textContent = old.textContent;
          old.replaceWith(s);
        });

        // Wire [RETURN TO HOME] links to close overlay instead of navigating
        sectionContent.querySelectorAll('a[href="index.html"]').forEach(a => {
          a.href = '#';
          a.addEventListener('click', e => { e.preventDefault(); closeSection(); });
        });

        overlay.style.display = 'block';
      } catch (_) {
        // Fallback for file:// protocol — direct navigation
        window.location.href = url;
      }
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      const current = sections.findIndex(s => s.id === activeId);
      if (e.key === 'ArrowUp') {
        const prev = (current - 1 + sections.length) % sections.length;
        setActive(sections[prev].id);
      } else if (e.key === 'ArrowDown') {
        const next = (current + 1) % sections.length;
        setActive(sections[next].id);
      } else if (e.key >= '1' && e.key <= '5') {
        setActive(sections[parseInt(e.key) - 1].id);
      }
    });

    // Initialize
    buildNav();
    setActive('introduction');
  </script>
  <script>
    (function () {
      const canvas = document.getElementById('hero-bg');
      const ctx    = canvas.getContext('2d');

      const COLS   = 48, ROWS = 30;
      const WALL_X = 6.0, WALL_Y = 3.8;
      const ROT_Y  = -1.35, CAM_Z = 8.0;
      const TILT   = 0.18;

      const sinBase = Math.sin(ROT_Y);
      const RZ_NEAR = WALL_X  * sinBase;
      const RZ_FAR  = -WALL_X * sinBase;
      const RZ_SPAN = RZ_FAR - RZ_NEAR;

      // Each section gets a fixed tile on the wall — scattered naturally in the visible centre area
      const SECTION_TILES = {
        introduction: { c: 41, r: 11 },
        signalling:   { c: 39, r: 13 },
        philosophy:   { c: 43, r: 14 },
        athletics:    { c: 36, r: 9  },
        reading:      { c: 42, r: 17 },
      };
      let activeSection = 'introduction';
      window.setMeshActive    = id => { activeSection = id; tileScale = 1.0; };
      let camZOffset = 0;
      window.setMeshPunch       = () => { camZOffset = -2.5; };
      window.setMeshPunchReturn = () => {};
      // Highlight fade
      let hlAlpha = 1, hlTarget = 1;
      window.setMeshHighlight = show => { hlTarget = show ? 1 : 0; };
      // Active tile scale — lerps from 1.0 → 1.32 when section changes (subtle zoom-in)
      let tileScale = 1.32;

      function drawRoundedQuad(c, rf) {
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
          const prev = c[(i + 3) % 4], curr = c[i], next = c[(i + 1) % 4];
          const ax = prev.x - curr.x, ay = prev.y - curr.y;
          const bx = next.x - curr.x, by = next.y - curr.y;
          const la = Math.hypot(ax, ay) || 0.001, lb = Math.hypot(bx, by) || 0.001;
          const r  = Math.min(la, lb) * rf;
          const p1x = curr.x + (ax/la)*r, p1y = curr.y + (ay/la)*r;
          const p2x = curr.x + (bx/lb)*r, p2y = curr.y + (by/lb)*r;
          if (i === 0) ctx.moveTo(p1x, p1y); else ctx.lineTo(p1x, p1y);
          ctx.quadraticCurveTo(curr.x, curr.y, p2x, p2y);
        }
        ctx.closePath();
      }

      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);

      // 3 drifting columns — alternating up/down, drift and fade at edges
      const DRIFT_COLS   = [13, 29, 36, 41, 44];
      const DRIFT_DIRS   = [1,  1, -1,  1,  0];
      const DRIFT_SPEED  = 0.00075;
      const DRIFT_RANGE  = WALL_Y * 2;
      const driftOffsets = [0, 0.2, 0, 0, 0];

      let time = 0;
      function frame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        hlAlpha    += (hlTarget    - hlAlpha)    * 0.22;
        tileScale  += (1.32        - tileScale)  * 0.06;
        camZOffset += (0 - camZOffset) * 0.07;
        const rowSpacing = (WALL_Y * 2) / (ROWS - 1);
        for (let i = 0; i < 5; i++) {
          if (DRIFT_DIRS[i] === 0) continue;
          driftOffsets[i] += DRIFT_DIRS[i] * DRIFT_SPEED;
          // Wrap modulo one row spacing — the reset is invisible because
          // the exiting dot is already at edgeFade=0 when it wraps
          driftOffsets[i] = ((driftOffsets[i] % rowSpacing) + rowSpacing) % rowSpacing;
        }

        ctx.save();
        ctx.translate(canvas.width * 0.5, canvas.height * 0.5);
        ctx.rotate(TILT);
        ctx.translate(-canvas.width * 0.5, -canvas.height * 0.5);

        const FOC = canvas.height;
        const VPX = canvas.width * 0.70;
        const VPY = canvas.height * 0.50;
        const WS  = 13.0 * (RZ_NEAR + CAM_Z) / FOC;

        const rotY = ROT_Y + Math.sin(time * 0.05) * 0.015;
        const cosY = Math.cos(rotY), sinY = Math.sin(rotY);

        const pts = [];
        for (let c = 0; c < COLS; c++) {
          for (let r = 0; r < ROWS; r++) {
            const u = c / (COLS - 1), v = r / (ROWS - 1);
            const wx = (u - 0.5) * WALL_X * 2, wy = (v - 0.5) * WALL_Y * 2;
            const rx = wx * cosY, rz = wx * sinY;
            const depth = rz + CAM_Z + camZOffset;
            if (depth <= 0.01) continue;
            pts.push({ wx, wy, rz, depth, c, r });
          }
        }
        pts.sort((a, b) => b.rz - a.rz);

        const activeTile = SECTION_TILES[activeSection];
        let activeTileCenter = null;

        for (const p of pts) {
          const t = Math.min(1, Math.max(0, (p.rz - RZ_NEAR) / RZ_SPAN));
          const tileWS = WS;

          const driftIdx = DRIFT_COLS.indexOf(p.c);
          const wyOff    = driftIdx >= 0 ? driftOffsets[driftIdx] : 0;
          const effWy    = p.wy + wyOff;
          const edgeFade = driftIdx >= 0 ? Math.max(0, 1 - Math.pow(effWy / WALL_Y, 2)) : 1;

          const offsets = [[-tileWS,-tileWS],[tileWS,-tileWS],[tileWS,tileWS],[-tileWS,tileWS]];
          const corners = offsets.map(([dw, dh]) => {
            const cwx = p.wx + dw;
            const crx = cwx * cosY, crz = cwx * sinY;
            const cd = crz + CAM_Z + camZOffset;
            if (cd <= 0.01) return null;
            const cs = FOC / cd;
            return { x: VPX + crx * cs, y: VPY + (effWy + dh) * cs };
          });
          if (corners.some(c => c === null)) continue;

          const alpha = (0.03 + (1 - t) * 0.28) * edgeFade;
          const ch    = Math.round(82 + t * 138);
          ctx.fillStyle = `rgba(${ch},${ch},${ch},${alpha.toFixed(3)})`;
          drawRoundedQuad(corners, 0.44);
          ctx.fill();
        }


        ctx.restore();
        time += 0.01;
        requestAnimationFrame(frame);
      }
      frame();
    })();
  </script>
  <script src="cursor.js"></script>
</body>
</html>
