<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#f9f9fb" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew Barzik | Philosophy</title>
  <meta name="description" content="A collection of quotes and aphorisms that shaped my thinking." />
  <link rel="icon" type="image/jpeg" href="assets/salzburg_philosophy.jpg" />
  <style>* { cursor: none !important; }</style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'primary': '#5f5e60',
            'surface': '#f9f9fb',
            'surface-container-low': '#f2f4f6',
            'surface-container-lowest': '#ffffff',
            'surface-container-high': '#e4e9ee',
            'surface-container-highest': '#dde3e9',
            'surface-container': '#ebeef2',
            'surface-dim': '#d3dbe2',
            'on-surface': '#2d3338',
            'on-surface-variant': '#596065',
            'on-background': '#2d3338',
            'background': '#f9f9fb',
            'outline-variant': '#acb3b8',
            'outline': '#757c81',
            'primary-dim': '#535254',
            'inverse-surface': '#0c0e10',
            'error': '#9f403d',
          },
          borderRadius: {
            'DEFAULT': '0.25rem',
            'lg': '0.5rem',
            'xl': '0.75rem',
            'full': '9999px',
          },
        }
      }
    }
  </script>
  <style>
    :root { color-scheme: light; }
    html, body { background-color: #f9f9fb; }
    * { font-family: 'Inter', sans-serif; }
    body { -webkit-font-smoothing: antialiased; overflow: hidden; }
    @keyframes blink { 0%, 49% { opacity:1; } 50%, 100% { opacity:0; } }
    .blink { animation: blink 1s step-end infinite; }
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
    }
    .crt-text {
      display: inline-block;
      background: repeating-linear-gradient(
        180deg,
        #050508 0px,
        #1a1a26 1px,
        #6a6a7a 2.5px,
        #1a1a26 4px,
        #050508 5px
      );
      background-size: 100% 5px;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: crt-roll 1.5s linear infinite, crt-flicker 6s step-end infinite;
    }
    @keyframes crt-roll {
      from { background-position: 0 0; }
      to   { background-position: 0 5px; }
    }
    @keyframes crt-flicker {
      0%, 87%, 100% { filter: brightness(1); }
      89%           { filter: brightness(0.78); }
      91%           { filter: brightness(1.12); }
      93%           { filter: brightness(0.84); }
      95%           { filter: brightness(1.06); }
      97%           { filter: brightness(1); }
    }
    @media (max-width: 767px) {
      #btn-prev { left: 1rem !important; top: auto !important; bottom: 0 !important; transform: none !important; }
      #btn-next { right: 1rem !important; top: auto !important; bottom: 0 !important; transform: none !important; }
      .quote-area { min-height: 300px !important; padding-bottom: 3rem; }
      #quote-text { font-size: 1rem !important; }
    }
  </style>
</head>
<body class="h-screen bg-[#f9f9fb] overflow-hidden flex flex-col">

  <!-- Subtle background -->
  <div class="fixed inset-0 pointer-events-none -z-10 opacity-[0.06]" style="background: radial-gradient(ellipse at center, #2d3338 0%, transparent 70%);"></div>

  <!-- Fixed header -->
  <div class="fixed top-0 left-0 right-0 z-50 px-8 md:px-12 py-8 flex justify-between items-start pointer-events-none">
    <a href="index.html" class="text-[10px] font-bold tracking-[0.2em] uppercase text-zinc-500 hover:text-zinc-900 transition-colors pointer-events-auto">[ RETURN TO HOME ]</a>
    <span class="crt-text text-[11px] font-bold tracking-[0.25em] uppercase text-zinc-900">PHILOSOPHY</span>
  </div>

  <!-- Main content -->
  <div class="min-h-screen flex items-center justify-center">
    <div class="max-w-[1000px] w-full flex flex-col items-center px-8">

      <!-- Section heading -->
      <p style="font-size:11px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#1d1d1f; margin-bottom:5rem;">[ COLLECTED QUOTES AND APHORISMS ] <span class="blink" style="opacity:1;">‹</span></p>

      <!-- Quote area -->
      <div class="quote-area flex items-center justify-center w-full relative min-h-[400px]">

        <!-- Quote counter -->
        <span id="quote-counter" class="absolute top-0 left-0 text-[9px] font-bold tracking-[0.3em] uppercase" style="color: rgba(89,96,101,0.75);">01 / 09</span>

        <!-- Previous button -->
        <button
          id="btn-prev"
          class="absolute -left-12 md:-left-14 top-[44%] -translate-y-1/2 transition-opacity duration-200"
          aria-label="Previous quote"
        >
          <span style="font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#1d1d1f;">[ previous ]</span>
        </button>

        <!-- Next button -->
        <button
          id="btn-next"
          class="absolute -right-12 md:-right-14 top-[44%] -translate-y-1/2 transition-opacity duration-200"
          aria-label="Next quote"
        >
          <span style="font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:#1d1d1f;">[ next ]</span>
        </button>

        <!-- Quote block -->
        <div class="flex flex-col items-center text-center max-w-2xl">
          <p id="quote-text" class="text-xl md:text-2xl leading-relaxed mb-10" style="color: #1a1f24; font-family: 'Courier New', Courier, monospace; font-weight: 400; font-style: italic;">&ldquo;A man who lives each day as it was his last, neither fears nor longs the next day.&rdquo;</p>
          <span id="quote-author" class="text-[0.625rem] font-bold tracking-[0.25em] uppercase" style="color: #596065;">— SENECA</span>
        </div>

      </div>
    </div>
  </div>

  <!-- Footer hint -->
  <div class="fixed bottom-12 left-0 right-0 flex justify-center pointer-events-none z-40">
    <span class="text-[9px] tracking-[0.25em] uppercase" style="color: rgba(89,96,101,0.65);">Use arrow keys</span>
  </div>

  <script>
    (function () {
      const quotes = [
        { text: "A man who lives each day as it was his last, neither fears nor longs the next day.", author: "— SENECA" },
        { text: "Talking nonsense is the sole privilege mankind possesses over the other organisms. It's by talking nonsense that one gets to the truth.", author: "— FYODOR DOSTOEVSKY" },
        { text: "There is a certain beauty in chaos, in the uncontrollable.", author: "— UNKNOWN" },
        { text: "It is not that we have a short time to live, but that we waste a great deal of it.", author: "— SENECA" },
        { text: "A man then must stand upright, not be kept upright by others.", author: "— MARCUS AURELIUS" },
        { text: "That which does not kill me, makes me stronger.", author: "— FRIEDRICH NIETZSCHE" },
        { text: "Grant me the serenity to accept the things I cannot change, courage to change the things that I can, and wisdom to know the difference.", author: "— REINHOLD NIEBUHR" },
        { text: "It is my ambition to say in ten sentences what everyone else says in a book.", author: "— FRIEDRICH NIETZSCHE" },
        { text: "Cowards die many times before their deaths; the valiant never taste of death but once.", author: "— WILLIAM SHAKESPEARE" },
      ];

      let current = 0;

      const quoteText   = document.getElementById('quote-text');
      const quoteAuthor = document.getElementById('quote-author');
      const counter     = document.getElementById('quote-counter');
      const btnPrev     = document.getElementById('btn-prev');
      const btnNext     = document.getElementById('btn-next');

      function pad(n) { return String(n).padStart(2, '0'); }

      function show(index) {
        quoteText.textContent   = '\u201c' + quotes[index].text + '\u201d';
        quoteAuthor.textContent = quotes[index].author;
        counter.textContent     = pad(index + 1) + ' / ' + pad(quotes.length);
        btnPrev.style.opacity        = index === 0 ? '0.2' : '0.7';
        btnPrev.style.pointerEvents  = index === 0 ? 'none' : 'auto';
        btnNext.style.opacity        = index === quotes.length - 1 ? '0.2' : '0.7';
        btnNext.style.pointerEvents  = index === quotes.length - 1 ? 'none' : 'auto';
      }

      btnPrev.addEventListener('click', () => { if (current > 0) { current--; show(current); } });
      btnNext.addEventListener('click', () => { if (current < quotes.length - 1) { current++; show(current); } });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft'  && current > 0)                  { current--; show(current); }
        if (e.key === 'ArrowRight' && current < quotes.length - 1)  { current++; show(current); }
      });

      show(0);
    })();
  </script>
  <script src="cursor.js"></script>
</body>
</html>
